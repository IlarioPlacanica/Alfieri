---
title: Appartamenti
---

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/styl.css' | relative_url }}">
</head>
<body>
  <main class="container">
    <h1>Appartamenti disponibili</h1>
    <div class="listing">
      {% for apartment in site.apartments %}
        {% assign first_image = apartment.gallery | first %}
        <a class="listing-card" href="{{ apartment.url | relative_url }}">
          {% if first_image %}
            <img src="{{ first_image | relative_url }}" alt="{{ apartment.title }}">
          {% endif %}
          <div class="listing-body">
            <h2>{{ apartment.title }}</h2>
            <p>{{ apartment.address }}</p>
            <strong>{{ apartment.price }}</strong>
          </div>
        </a>
      {% endfor %}
    </div>
  </main>
</body>
</html>
