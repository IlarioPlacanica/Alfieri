<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/styl.css' | relative_url }}">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script type="importmap">
  {
    "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <main class="page">
    <div class="app-card">

      <header class="section-nav">
        <a href="#video">VIDEO</a>
        <a href="#render">RENDER</a>
        <a href="#modello-3d">MODELLO 3D</a>
        <a href="#tour">TOUR</a>
      </header>

      {% if page.hero_video %}
      <section id="video" class="block scroll-target">
        <div class="hero-media media-card">
          <video
            class="hero-video"
            autoplay
            muted
            loop
            playsinline
            {% if page.hero_poster %}poster="{{ page.hero_poster | relative_url }}"{% endif %}
          >
            <source src="{{ page.hero_video | relative_url }}" type="video/mp4">
          </video>

          {% if page.hero_overlay_png %}
          <img
            class="hero-overlay-png"
            src="{{ page.hero_overlay_png | relative_url }}"
            alt=""
          >
          {% endif %}
        </div>
      </section>
      {% endif %}

      {% if page.gallery %}
      <section id="render" class="block scroll-target">
        <div class="gallery-column">
          {% for image in page.gallery %}
          <div class="gallery-item media-card">
            <img
              src="{{ image | relative_url }}"
              alt=""
              loading="lazy"
            >
          </div>
          {% endfor %}
        </div>
      </section>
      {% endif %}

     {% if page.glb_model %}
     <section id="modello-3d" class="block scroll-target">
       <div
         class="viewer-wrap three-viewer"
         data-model="{{ page.glb_model | relative_url }}">
         <canvas id="three-canvas"></canvas>
       </div>
     </section>
     <script type="module" src="{{ '/assets/js/three-viewer.js' | relative_url }}"></script>
     {% endif %}

      {% if page.tour_embed_url %}
      <section id="tour" class="block scroll-target">
        <div class="tour-wrap media-card">
          <iframe
            src="{{ page.tour_embed_url | relative_url }}"
            title="Tour virtuale"
            loading="lazy"
            allowfullscreen>
          </iframe>
        </div>
      </section>
      {% endif %}

    </div>
  </main>

  <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
</body>
</html>
