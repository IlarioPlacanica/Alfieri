<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/styl.css' | relative_url }}">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
  <main class="page">
    <div class="app-card">

      <header class="section-nav">
        <a href="#video">VIDEO</a>
        <a href="#render">RENDER</a>
        <a href="#modello-3d">MODELLO 3D</a>
        <a href="#tour">TOUR</a>
      </header>

      {% if page.hero_video %}
      <section id="video" class="block scroll-target">
        <div class="hero-media media-card">
          <video
            class="hero-video"
            autoplay
            muted
            loop
            playsinline
            {% if page.hero_poster %}poster="{{ page.hero_poster | relative_url }}"{% endif %}
          >
            <source src="{{ page.hero_video | relative_url }}" type="video/mp4">
          </video>

          {% if page.hero_overlay_png %}
          <img
            class="hero-overlay-png"
            src="{{ page.hero_overlay_png | relative_url }}"
            alt=""
          >
          {% endif %}
        </div>
      </section>
      {% endif %}

      {% if page.gallery %}
      <section id="render" class="block scroll-target">
        <div class="gallery-column">
          {% for image in page.gallery %}
          <div class="gallery-item media-card">
            <img
              src="{{ image | relative_url }}"
              alt=""
              loading="lazy"
            >
          </div>
          {% endfor %}
        </div>
      </section>
      {% endif %}

      {% if page.glb_model %}
      <section id="modello-3d" class="block scroll-target">
        <div class="viewer-wrap media-card">
          <model-viewer
            src="{{ page.glb_model | relative_url }}"
            {% if page.glb_poster %}poster="{{ page.glb_poster | relative_url }}"{% endif %}
            camera-controls
            interaction-prompt="none"
            environment-image="legacy"
            shadow-intensity="2"
            exposure="1"
            loading="eager"
            reveal="auto"
            class="glb-viewer">
          </model-viewer>
        </div>
      </section>
      {% endif %}

      {% if page.tour_embed_url %}
      <section id="tour" class="block scroll-target">
        <div class="tour-wrap media-card">
          <iframe
            src="{{ page.tour_embed_url | relative_url }}"
            title="Tour virtuale"
            loading="lazy"
            allowfullscreen>
          </iframe>
        </div>
      </section>
      {% endif %}

    </div>
  </main>

  <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
</body>
</html>
